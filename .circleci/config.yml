version: 2.1

jobs:
  build:
    docker:
      - image: quay.io/droidian/build-essential:bookworm-amd64
    steps:
      - checkout
      - run:
          name: Install build dependencies
          command: |
            apt-get update
            apt-get install -y crossbuild-essential-arm64
      - run:
          name: Build package
          command: |
            dpkg-buildpackage -us -uc -aarm64
      - store_artifacts:
          path: ../*.deb
          destination: /

workflows:
  build:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
