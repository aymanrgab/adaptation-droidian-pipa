# ALSA UCM2 configuration for Xiaomi Pad 6 (pipa)
# Qualcomm SM8250 (Snapdragon 870) with Aqstic audio codec
#
# This is a template - extract the actual mixer paths from the
# Android vendor partition's /vendor/etc/audio_*.xml files
# using the Halium ucm-data-extractor tool.

SectionUseCase."HiFi" {
    File "HiFi.conf"
    Comment "HiFi playback and capture"
}

SectionUseCase."Voice" {
    File "Voice.conf"
    Comment "Voice call"
}

SectionUseCase."Deep Buffer" {
    File "DeepBuffer.conf"
    Comment "Deep buffer playback"
}
